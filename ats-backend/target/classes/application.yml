spring:
  application:
    name: ats-backend

  datasource:
    url: jdbc:mysql://localhost:3306/ats_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
    username: ats_user
    password: ats_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway controla o schema; JPA só valida
    show-sql: true              # Mostra as queries no console (útil em dev)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB       # Tamanho máximo do currículo (Fase 2)
      max-request-size: 10MB

server:
  port: 8080

# Swagger UI disponível em: http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# Caminho onde os currículos serão salvos (Fase 2)
storage:
  location: uploads/curriculos
